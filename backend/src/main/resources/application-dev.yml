spring:
  datasource:
    url: jdbc:h2:mem:taskowolf;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    show-sql: false

logging:
  level:
    com.taskowolf: DEBUG

taskowolf:
  jwt:
    secret: ${TW_JWT_SECRET:dev-secret-change-in-production-min-256-bits}
  allowed-origins: "http://localhost:*"

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true
