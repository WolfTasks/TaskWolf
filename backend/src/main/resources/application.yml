spring:
  application:
    name: taskowolf
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${TW_SMTP_HOST:}
    port: ${TW_SMTP_PORT:587}
    username: ${TW_SMTP_USER:}
    password: ${TW_SMTP_PASS:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false
  servlet:
    multipart:
      max-file-size: ${TW_ATTACHMENT_MAX_SIZE:26214400}
      max-request-size: ${TW_ATTACHMENT_MAX_SIZE:26214400}

server:
  port: 8080

taskowolf:
  jwt:
    secret: ${TW_JWT_SECRET:}
    access-token-expiry: 900
    refresh-token-expiry: 604800
  base-url: ${TW_BASE_URL:http://localhost:8080}
  attachment:
    max-size: ${TW_ATTACHMENT_MAX_SIZE:26214400}
    path: ${TW_ATTACHMENT_PATH:./data/attachments}
  smtp:
    from: ${TW_SMTP_FROM:TaskWolf <noreply@example.com>}
  mail:
    imap:
      enabled: ${TW_MAIL_IMAP_ENABLED:false}
      host: ${TW_MAIL_IMAP_HOST:}
      port: ${TW_MAIL_IMAP_PORT:993}
      user: ${TW_MAIL_IMAP_USER:}
      password: ${TW_MAIL_IMAP_PASS:}
      folder: INBOX
      polling-interval: 30000
  auth:
    registration-enabled: ${TW_REGISTRATION_ENABLED:true}
    rate-limit:
      max-requests: 10
      window-seconds: 60
  allowed-origins: ${TW_ALLOWED_ORIGINS:${taskowolf.base-url}}

springdoc:
  swagger-ui:
    enabled: false
    path: /swagger-ui.html
  api-docs:
    enabled: false
