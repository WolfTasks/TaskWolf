version: 2
updates:
  - package-ecosystem: gradle
    directory: /backend
    schedule:
      interval: weekly
    cooldown:
      default-days: 5
    groups:
      backend-deps:
        patterns: ["*"]
    ignore:
      # Never auto-apply backend *major* bumps. A major here means breaking
      # changes that belong in a dedicated, hand-driven migration rather than a
      # batched Dependabot PR. Concretely:
      #   - Spring Boot 4.x — deliberate future migration, see PR #10 (stay on 3.5.x).
      #   - The backend-deps group #17 batched Gradle 9, springdoc 3,
      #     Testcontainers 2, okhttp 5 and dependency-check 12 in one PR and
      #     failed CI. Each needs its own upgrade effort (e.g. Kotlin/Gradle 9
      #     also entails the kotlinOptions{} -> compilerOptions{} DSL migration).
      # Minor/patch updates still group and open automatically. Scope this down
      # or drop it when tackling a specific major upgrade by hand.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    cooldown:
      default-days: 5
    groups:
      frontend-deps:
        patterns: ["*"]
    ignore:
      # Never auto-apply the TypeScript *major* bump. TS 7.x is the native
      # ("corsa") rewrite: its default import no longer exposes the compiler
      # API (ScriptTarget, createSourceFile, ...) — that now lives under the
      # explicitly-unstable `typescript/unstable/*` entrypoints. The grouped
      # bump to 7.0.2 in PR #81 broke the i18n scanner (scripts/i18n-scan-core.mjs)
      # and the whole `tsc` typecheck. Adopting TS 7 is a dedicated, hand-driven
      # migration, not a batched Dependabot PR. Drop this when doing that upgrade.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directories: ["/backend", "/frontend"]
    schedule:
      interval: weekly
