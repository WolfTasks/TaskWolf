name: Publish to Docker Hub

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read
  id-token: write   # cosign keyless via OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - context: ./backend
            image: kwolfgang/taskowolf-backend
            gradle_build: true
          - context: ./frontend
            image: kwolfgang/taskowolf-frontend
            gradle_build: false

    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411   # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0

      - name: Set up JDK 21
        if: matrix.gradle_build
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520   # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build backend JAR
        if: matrix.gradle_build
        working-directory: backend
        run: |
          chmod +x gradlew
          ./gradlew bootJar

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3   # v4.1.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5   # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee   # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9   # v6.1.0
        id: meta
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf   # v7.2.0
        id: build
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6   # v4.1.2

      - name: Sign image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ matrix.image }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
