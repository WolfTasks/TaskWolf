name: Publish to Docker Hub

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read
  id-token: write   # cosign keyless via OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - context: ./backend
            image: kwolfgang/taskowolf-backend
            gradle_build: true
          - context: ./frontend
            image: kwolfgang/taskowolf-frontend
            gradle_build: false

    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411   # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0

      - name: Set up JDK 21
        if: matrix.gradle_build
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520   # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build backend JAR
        if: matrix.gradle_build
        working-directory: backend
        run: |
          chmod +x gradlew
          ./gradlew bootJar

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8   # v4.2.0

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c   # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0   # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302   # v6.2.0
        id: meta
        with:
          images: ${{ matrix.image }}
          tags: |
            # Derive the image tag from the git tag verbatim, stripping the
            # leading "v" (e.g. v1.0.03 -> 1.0.03). type=semver is NOT usable
            # here: the project's release convention uses a leading-zero patch
            # (v1.0.0x), which is invalid semver, so type=semver silently
            # produced an empty tag and only `latest` was ever pushed.
            type=match,pattern=v(.*),group=1
            type=raw,value=latest

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a   # v7.3.0
        id: build
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6   # v4.1.2

      - name: Sign image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ matrix.image }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
