name: Nightly Security Scan

on:
  schedule:
    - cron: '0 3 * * *'   # täglich 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write

# Nightly dependency (SCA) scan via Trivy. Trivy resolves its vulnerability
# database from GHCR (OCI), independent of the NVD live API — which has been
# returning 503/524 for extended periods and previously made the OWASP
# Dependency-Check nightly unreliable. The gate mirrors the per-push Trivy
# scan in ci.yml (HIGH,CRITICAL). The nightly cadence catches CVEs newly
# disclosed against unchanged dependencies.
jobs:
  trivy-repo-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920   # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0              # v7.0.0
      - name: Trivy filesystem scan (gate HIGH,CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25    # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          # Honour `severity` for the exit-code with SARIF output (same gotcha
          # as ci.yml): without this the SARIF covers all severities and the
          # exit-code fires on MEDIUM/LOW too.
          limit-severities-for-sarif: true
          trivyignores: .trivyignore
          format: sarif
          output: trivy-nightly.sarif
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9   # v4.37.0
        with:
          sarif_file: trivy-nightly.sarif
          category: trivy-nightly
      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3          # v9.0.0
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly security scan failed (${new Date().toISOString().slice(0,10)})`,
              body: 'Trivy meldete HIGH/CRITICAL-CVEs in Dependencies. Siehe Workflow-Run und den Security-Tab (Code scanning, Kategorie `trivy-nightly`).',
              labels: ['security']
            })
