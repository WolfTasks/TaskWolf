name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920   # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a   # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make Gradle wrapper executable
        run: chmod +x backend/gradlew

      - name: Run backend tests
        working-directory: backend
        run: ./gradlew test

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920   # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020   # v7.0.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: npm audit (block on high/critical)
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: i18n scanner self-tests
        working-directory: frontend
        run: npm run test:i18n

      - name: i18n coverage + parity gate
        working-directory: frontend
        run: npm run lint:i18n

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  backend-docker:
    needs: backend-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920   # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a   # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make Gradle wrapper executable
        run: chmod +x backend/gradlew

      - name: Build JAR
        working-directory: backend
        run: ./gradlew bootJar

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0   # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302   # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/taskowolf-backend
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short

      - name: Build image for scan
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a   # v7.3.0
        with:
          context: ./backend
          load: true
          tags: taskowolf-backend:scan

      - name: Trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25   # v0.36.0
        with:
          image-ref: taskowolf-backend:scan
          severity: HIGH,CRITICAL
          exit-code: '1'
          # Honour `severity` for the exit-code with SARIF output. Without this
          # the action scans all severities for the SARIF and exit-code fires on
          # MEDIUM/LOW too — the gate must block on HIGH,CRITICAL only.
          limit-severities-for-sarif: true
          trivyignores: .trivyignore
          format: sarif
          output: trivy-backend.sarif

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9   # v4.37.0
        with:
          sarif_file: trivy-backend.sarif

      # Non-gating: report ALL severities to the code-scanning dashboard so
      # MEDIUM/LOW findings stay visible (the gate above blocks on HIGH,CRITICAL
      # only). Uploaded under a distinct category so it never collides with the
      # gate SARIF or the frontend report.
      - name: Trivy scan (report, all severities, non-gating)
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25   # v0.36.0
        with:
          image-ref: taskowolf-backend:scan
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          exit-code: '0'
          limit-severities-for-sarif: true
          trivyignores: .trivyignore
          format: sarif
          output: trivy-backend-report.sarif

      - name: Upload Trivy report SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9   # v4.37.0
        with:
          sarif_file: trivy-backend-report.sarif
          category: trivy-report-backend

      - name: Build and push backend image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a   # v7.3.0
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  frontend-docker:
    needs: frontend-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920   # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0   # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302   # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/taskowolf-frontend
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short

      - name: Build image for scan
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a   # v7.3.0
        with:
          context: ./frontend
          load: true
          tags: taskowolf-frontend:scan

      - name: Trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25   # v0.36.0
        with:
          image-ref: taskowolf-frontend:scan
          severity: HIGH,CRITICAL
          exit-code: '1'
          # Honour `severity` for the exit-code with SARIF output. Without this
          # the action scans all severities for the SARIF and exit-code fires on
          # MEDIUM/LOW too — the gate must block on HIGH,CRITICAL only.
          limit-severities-for-sarif: true
          trivyignores: .trivyignore
          format: sarif
          output: trivy-frontend.sarif

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9   # v4.37.0
        with:
          sarif_file: trivy-frontend.sarif

      # Non-gating: report ALL severities to the code-scanning dashboard so
      # MEDIUM/LOW findings stay visible (the gate above blocks on HIGH,CRITICAL
      # only). Uploaded under a distinct category so it never collides with the
      # gate SARIF or the backend report.
      - name: Trivy scan (report, all severities, non-gating)
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25   # v0.36.0
        with:
          image-ref: taskowolf-frontend:scan
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          exit-code: '0'
          limit-severities-for-sarif: true
          trivyignores: .trivyignore
          format: sarif
          output: trivy-frontend-report.sarif

      - name: Upload Trivy report SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9   # v4.37.0
        with:
          sarif_file: trivy-frontend-report.sarif
          category: trivy-report-frontend

      - name: Build and push frontend image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a   # v7.3.0
        with:
          context: ./frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  dependency-submission:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Dependency Graph schreiben
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920   # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0            # v7.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a          # v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Submit Gradle dependency graph
        uses: gradle/actions/dependency-submission@3f131e8634966bd73d06cc69884922b02e6faf92   # v6.2.0
        with:
          build-root-directory: backend

  dependency-review:
    needs: dependency-submission
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920   # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0            # v7.0.0
      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294   # v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920   # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e   # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
