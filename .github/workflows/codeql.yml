name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 3 * * 1'   # wöchentlich Mo 03:30 UTC

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    # TEMPORARY: CodeQL's Kotlin extractor does not yet support Kotlin 2.4.0
    # ("version too recent, supports below 2.3.30" — github/codeql#21938, fix PR #21970
    # unreleased). The java-kotlin build + analyze steps are marked continue-on-error so
    # the leg's check concludes success instead of blocking merges. Kotlin CodeQL scanning
    # is effectively disabled until then; re-enable (drop the continue-on-error lines +
    # bump codeql-action) per tracking issue #26. javascript-typescript stays fully enforced.
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920   # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0              # v7.0.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a            # v5
        if: matrix.language == 'java-kotlin'
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9     # v4.37.0
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          ram: 8192
      - name: Build backend for CodeQL
        if: matrix.language == 'java-kotlin'
        continue-on-error: true   # temp: Kotlin 2.4.0 unsupported by CodeQL — see issue #26
        run: |
          chmod +x gradlew
          ./gradlew compileTestKotlin -x test --no-daemon
        working-directory: backend
      - uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4.37.0
        continue-on-error: ${{ matrix.language == 'java-kotlin' }}   # temp: see issue #26
        with:
          category: "/language:${{ matrix.language }}"
